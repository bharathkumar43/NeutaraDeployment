services:

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB:       neutara_deployment
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgrespassword}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3200:3200"
    environment:
      NODE_ENV:              production
      PORT:                  3200
      DB_HOST:               db
      DB_PORT:               5432
      DB_NAME:               neutara_deployment
      DB_USER:               postgres
      DB_PASSWORD:           ${DB_PASSWORD:-postgrespassword}
      JWT_SECRET:            ${JWT_SECRET:-change_this_secret_in_production}
      JWT_EXPIRES_IN:        24h
      APP_URL:               ${APP_URL:-}
      FRONTEND_URL:          ${APP_URL:-http://localhost:3201}
      RATE_LIMIT_WINDOW_MS:  900000
      RATE_LIMIT_MAX:        1000
      UPLOAD_DIR:            uploads
      MAX_FILE_SIZE:         10485760
      AZURE_TENANT_ID:       ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID:       ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET:   ${AZURE_CLIENT_SECRET}
      EMAIL_SENDER:          ${EMAIL_SENDER:-}
      EMAIL_QA_DL:           ${EMAIL_QA_DL:-}
      EMAIL_QA_DL_2:         ${EMAIL_QA_DL_2:-}
      EMAIL_QA_DL_3:         ${EMAIL_QA_DL_3:-}
      EMAIL_INFRA_DL:        ${EMAIL_INFRA_DL:-}
      EMAIL_DEPLOYMENT_DL:   ${EMAIL_DEPLOYMENT_DL:-}
      EMAIL_ACK_NOTIFY_DL:   ${EMAIL_ACK_NOTIFY_DL:-}
      SCOPE_EMAIL_RECIPIENT: ${SCOPE_EMAIL_RECIPIENT:-}
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3200/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AZURE_CLIENT_ID: ${VITE_AZURE_CLIENT_ID:-}
        VITE_AZURE_TENANT_ID: ${VITE_AZURE_TENANT_ID:-}
    restart: unless-stopped
    ports:
      - "3201:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
